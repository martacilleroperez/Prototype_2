<!DOCTYPE html>
<html>
<head>
  <title>Character Parallax</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body class="parallax-right">

  <div id="black-overlay" class="active"></div>

  <section id="center">
    <div class="scene">

      <img class="layer bg" src="../public/images/img_trail_sol.png" alt="Background">

      <div id="text-1" class="saucer-popup">
        Explore the street and see how authorities try their best to control the insane crowd
      </div>

      <div id="text-2" class="saucer-popup">
        During this period, a strict set of rules was created to control the crowd
      </div>

      <div id="text-3" class="saucer-popup">
        These displays of lack of control led to serious consequences
      </div>

      <div id="text-4" class="saucer-popup">
        The carnival is coming to an end ...
      </div>

    </div>
  </section>

  <a href="../" style="position: fixed; top: 900px; right: 20px; z-index: 1000;">
    <img src="../public/images/back-icon.png" alt="Back" style="width:40px; height:40px;">
  </a>

  <script>
    const bg = document.querySelector(".bg");
    const mid = document.querySelector(".mid");
    const fg = document.querySelector(".fg");

    const isRight = document.body.classList.contains("parallax-right");

    function updateParallax() {
      const x = window.scrollX;

      if (bg) bg.style.transform = `translateX(${-x * 0.1}px)`;
      if (mid) mid.style.transform = `translateX(${-x * 0.3}px)`;
      if (fg) fg.style.transform = `translateX(${-x * 0.4}px)`;
    }

    function fadeToBlackAndStay(delay = 10000) {
      const overlay = document.getElementById("black-overlay");

      setTimeout(() => {
        if (overlay) {
          overlay.classList.add("active");
          document.body.style.overflow = "hidden";
        }
      }, delay);
    }

    function showText(id, showTime, hideTime) {
      const text = document.getElementById(id);

      setTimeout(() => {
        if (text) text.classList.add("active");
      }, showTime);

      setTimeout(() => {
        if (text) text.classList.remove("active");
      }, hideTime);
    }

    window.addEventListener("DOMContentLoaded", () => {
      if (isRight) {
        const maxScroll =
          document.documentElement.scrollWidth - window.innerWidth;

        window.scrollTo({
          left: maxScroll,
          top: 0
        });
      }

      updateParallax();

      const overlay = document.getElementById("black-overlay");

      if (overlay) {
        requestAnimationFrame(() => {
          overlay.classList.remove("active");
        });
      }

      showText("text-1", 8000, 20000);
      showText("text-2", 30000, 42000);
      showText("text-3", 60000, 72000);
      showText("text-4", 80000, 89000);

      fadeToBlackAndStay(90000);
    });

    window.addEventListener("scroll", updateParallax);
  </script>

</body>
</html>
