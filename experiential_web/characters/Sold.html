<!DOCTYPE html>
<html>
<head>
  <title>Character Parallax</title>
  <link rel="stylesheet" href="../../public/style.css">
</head>

<body class="parallax-right">

  <div id="black-overlay" class="active"></div>

  <section id="center">
    <div class="scene">

      <!-- Background image -->
      <img class="layer bg" src="/images/img_trail_sol.png" alt="Background">

      <!-- Popup texts -->
      <div id="text-1" class="saucer-popup">
        Attention everyone: let's keep movign and do not go to crazy 
      </div>

      <div id="text-2" class="saucer-popup">
        Follow the noise. These poeple are going to get in trouble 
      </div>

      <div id="text-3" class="saucer-popup">
        I need to control the poeple 
      </div>


      <div id="text-4" class="saucer-popup">
        The carnival is coming to an end ...
      </div>

    </div>
  </section>

  <!-- Back button -->
  <a href="/" style="position: fixed; top: 900px; right: 20px; z-index: 1000;">
    <img src="/images/back-icon.png" alt="Back" style="width:40px; height:40px;">
  </a>

  <script>

    const bg = document.querySelector(".bg");
    const mid = document.querySelector(".mid");
    const fg = document.querySelector(".fg");

    const isRight = document.body.classList.contains("parallax-right");

    // Parallax movement
    function updateParallax() {
      const x = window.scrollX;

      if (bg) {
        bg.style.transform = `translateX(${-x * 0.1}px)`;
      }

      if (mid) {
        mid.style.transform = `translateX(${-x * 0.3}px)`;
      }

      if (fg) {
        fg.style.transform = `translateX(${-x * 0.4}px)`;
      }
    }

    // Fade screen to black
    function fadeToBlackAndStay(delay = 10000) {
      const overlay = document.getElementById("black-overlay");

      setTimeout(() => {
        if (overlay) {
          overlay.classList.add("active");
          document.body.style.overflow = "hidden";
        }
      }, delay);
    }

    // Show + hide popup text
    function showText(id, showTime, hideTime) {

      const text = document.getElementById(id);

      // Show
      setTimeout(() => {
        if (text) {
          text.classList.add("active");
        }
      }, showTime);

      // Hide
      setTimeout(() => {
        if (text) {
          text.classList.remove("active");
        }
      }, hideTime);
    }

    // When page loads
    window.addEventListener("DOMContentLoaded", () => {

      // Start on right side
      if (isRight) {

        const maxScroll =
          document.documentElement.scrollWidth - window.innerWidth;

        window.scrollTo({
          left: maxScroll,
          top: 0
        });
      }

      updateParallax();

      // Remove black overlay at start
      const overlay = document.getElementById("black-overlay");

      if (overlay) {
        requestAnimationFrame(() => {
          overlay.classList.remove("active");
        });
      }
      showText("text-1", 8000, 18000);
      showText("text-2", 30000, 40000);
      showText("text-3", 60000, 70000);
      showText("text-4", 80000, 89000);
  
      fadeToBlackAndStay(90000);

    });

    window.addEventListener("scroll", updateParallax);

  </script>

</body>
</html>
